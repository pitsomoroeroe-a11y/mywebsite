<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Shop | @lavosbakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --ig-gradient: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045); }
        body { background: #fafafa; padding-bottom: 70px; }
        .ig-header { background: white; border-bottom: 1px solid #dbdbdb; padding: 12px 0; position: sticky; top: 0; z-index: 100; }
        .search-box { background: #efefef; border-radius: 12px; padding: 8px 12px; }
        .story-ring { width: 70px; height: 70px; border-radius: 50%; background: var(--ig-gradient); padding: 3px; cursor: pointer; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .post-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }
        .post-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 16px; cursor: pointer; transition: 0.2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .wishlist-icon { position: absolute; top: 8px; right: 8px; font-size: 24px; color: white; text-shadow: 0 0 2px black; cursor: pointer; }
        .hashtag-chip { background: #efefef; padding: 6px 14px; border-radius: 30px; cursor: pointer; display: inline-block; margin: 4px; }
        .cart-badge { position: absolute; top: -5px; right: -10px; background: #fd1d1d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        .toast-msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 8px 16px; border-radius: 30px; z-index: 2000; animation: fadeOut 2s; }
        @keyframes fadeOut { 0%{opacity:1}70%{opacity:1}100%{opacity:0} }
    </style>
</head>
<body>
<header class="ig-header">
    <div class="container d-flex justify-content-between align-items-center">
        <i class="bi bi-instagram fs-3" style="background:var(--ig-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
        <div class="search-box flex-grow-1 mx-3"><i class="bi bi-search"></i><input type="text" id="searchInput" placeholder="Search" onkeyup="performSearch()"></div>
        <div class="position-relative"><i class="bi bi-heart" style="cursor:pointer;" onclick="showWishlist()"></i><span id="wishlistCount" class="cart-badge">0</span></div>
        <div class="position-relative ms-3"><i class="bi bi-cart3" style="cursor:pointer;" onclick="showCart()"></i><span id="cartCount" class="cart-badge">0</span></div>
    </div>
</header>
<main class="container py-3" id="mainContent"></main>
<script>
    const STORAGE = { PRODUCTS: 'ig_products', CART: 'ig_cart', WISHLIST: 'ig_wishlist' };
    function init() {
        if(!localStorage.getItem(STORAGE.PRODUCTS)) localStorage.setItem(STORAGE.PRODUCTS, JSON.stringify([
            { id:1, name:'Wedding Cake', price:299.99, image:'https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?w=300', category:'wedding' },
            { id:2, name:'Birthday Rainbow', price:89.99, image:'https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg?w=300', category:'birthday' },
            { id:3, name:'Chocolate Fudge', price:79.99, image:'https://images.pexels.com/photos/1854651/pexels-photo-1854651.jpeg?w=300', category:'chocolate' }
        ]));
        if(!localStorage.getItem(STORAGE.CART)) localStorage.setItem(STORAGE.CART, JSON.stringify([]));
        if(!localStorage.getItem(STORAGE.WISHLIST)) localStorage.setItem(STORAGE.WISHLIST, JSON.stringify([]));
    }
    function getProducts(){ return JSON.parse(localStorage.getItem(STORAGE.PRODUCTS)); }
    function getCart(){ return JSON.parse(localStorage.getItem(STORAGE.CART)); }
    function getWishlist(){ return JSON.parse(localStorage.getItem(STORAGE.WISHLIST)); }
    function saveCart(c){ localStorage.setItem(STORAGE.CART, JSON.stringify(c)); updateCounters(); }
    function saveWishlist(w){ localStorage.setItem(STORAGE.WISHLIST, JSON.stringify(w)); updateCounters(); }
    function updateCounters(){ document.getElementById('cartCount').innerText=getCart().reduce((s,i)=>s+i.qty,0); document.getElementById('wishlistCount').innerText=getWishlist().length; }
    function showToast(msg){ const t=document.createElement('div'); t.className='toast-msg'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function addToCart(id){ let cart=getCart(); let existing=cart.find(i=>i.id===id); if(existing) existing.qty++; else cart.push({id,qty:1}); saveCart(cart); showToast('Added to cart'); }
    function toggleWishlist(id){ let w=getWishlist(); if(w.includes(id)){ w=w.filter(i=>i!==id); showToast('Removed from wishlist'); } else { w.push(id); showToast('Added to wishlist'); } saveWishlist(w); renderHome(); }
    function renderHome(){ const prods=getProducts(); const hashtags=['#weddingcake','#birthdaycake','#chocolatecake']; const locations=['Lavos Bakery NYC','Brooklyn Bakery']; let html=`<div class="d-flex gap-3 overflow-auto pb-3"><div class="text-center"><div class="story-ring"><img src="https://randomuser.me/api/portraits/women/68.jpg"></div><small>lavos</small></div></div><h6 class="mt-3">Trending Hashtags</h6><div>${hashtags.map(h=>`<span class="hashtag-chip" onclick="searchHashtag('${h}')">${h}</span>`).join('')}</div><h6 class="mt-3">Shop</h6><div class="post-grid">${prods.map(p=>`<img src="${p.image}" onclick="quickView(${p.id})">`).join('')}</div><h6 class="mt-3">Products</h6><div class="row g-2">${prods.map(p=>`<div class="col-6"><div class="product-card position-relative" onclick="quickView(${p.id})"><img src="${p.image}" class="product-img"><i class="bi bi-heart${getWishlist().includes(p.id)?'-fill':''} wishlist-icon" onclick="event.stopPropagation(); toggleWishlist(${p.id})"></i><div class="p-2"><div>${p.name}</div><div><strong>$${p.price}</strong></div><button class="btn btn-sm btn-primary w-100" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join('')}</div>`; document.getElementById('mainContent').innerHTML=html; updateCounters(); }
    function showCart(){ let cart=getCart(); const prods=getProducts(); if(cart.length===0){ document.getElementById('mainContent').innerHTML='<div class="text-center py-5"><i class="bi bi-cart-x fs-1"></i><h6>Cart empty</h6></div>'; return; } let total=0; let html=`<h3>Cart</h3>`; cart.forEach(c=>{ const p=prods.find(p=>p.id===c.id); if(p){ total+=p.price*c.qty; html+=`<div class="d-flex justify-content-between align-items-center border-bottom p-2"><div><img src="${p.image}" width="50" class="rounded"><div><strong>${p.name}</strong> x${c.qty}</div></div><div>$${p.price*c.qty}</div><button class="btn btn-sm btn-danger" onclick="removeFromCart(${c.id})">Remove</button></div>`; } }); html+=`<div class="mt-3"><strong>Total: $${total.toFixed(2)}</strong><button class="btn btn-primary w-100 mt-2" onclick="alert('Order placed! Cart cleared')">Checkout</button></div>`; document.getElementById('mainContent').innerHTML=html; updateCounters(); }
    function removeFromCart(id){ let cart=getCart().filter(i=>i.id!==id); saveCart(cart); showCart(); }
    function showWishlist(){ const w=getWishlist(); const prods=getProducts().filter(p=>w.includes(p.id)); if(w.length===0){ document.getElementById('mainContent').innerHTML='<div class="text-center py-5"><i class="bi bi-heart fs-1"></i><h6>Wishlist empty</h6></div>'; return; } let html=`<h3>Wishlist</h3><div class="row g-2">${prods.map(p=>`<div class="col-6"><div class="product-card"><img src="${p.image}" class="product-img"><div class="p-2"><div>${p.name}</div><div><strong>$${p.price}</strong></div><button class="btn btn-sm btn-primary w-100 mt-1" onclick="addToCart(${p.id})">Add to Cart</button><button class="btn btn-sm btn-outline-danger w-100 mt-1" onclick="toggleWishlist(${p.id})">Remove</button></div></div></div>`).join('')}</div>`; document.getElementById('mainContent').innerHTML=html; updateCounters(); }
    function quickView(id){ showToast(`Viewing product ${id}`); }
    function performSearch(){ const q=document.getElementById('searchInput').value.toLowerCase(); const prods=getProducts().filter(p=>p.name.toLowerCase().includes(q)); document.getElementById('mainContent').innerHTML=`<div class="row g-2">${prods.map(p=>`<div class="col-6"><div class="product-card"><img src="${p.image}" class="product-img"><div class="p-2"><div>${p.name}</div><div><strong>$${p.price}</strong></div><button class="btn btn-sm btn-primary" onclick="addToCart(${p.id})">Add to Cart</button></div></div></div>`).join('')}</div>`; }
    function searchHashtag(tag){ document.getElementById('searchInput').value=tag; performSearch(); }
    init(); renderHome();
</script>
</body>
</html>
