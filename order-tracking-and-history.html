<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module 3: Order Tracking & History | Lavos Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .timeline-icon { width: 40px; height: 40px; background: #e9ecef; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .timeline-icon.completed { background: #d4a373; color: white; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4" id="trackingApp"></div>
<script>
    // Sample orders stored in localStorage
    let sampleOrders = [
        { id: 1, order_number: 'TRK-001', customer_name: 'John Doe', customer_email: 'john@example.com', product_name: 'Wedding Cake', total: 299.99, status: 'delivered', order_date: '2025-04-01', timeline: ['pending','processing','shipped','delivered'] },
        { id: 2, order_number: 'TRK-002', customer_name: 'Jane Smith', customer_email: 'jane@example.com', product_name: 'Birthday Cake', total: 89.99, status: 'processing', order_date: '2025-04-05', timeline: ['pending','processing'] },
        { id: 3, order_number: 'TRK-003', customer_name: 'Bob Brown', customer_email: 'bob@example.com', product_name: 'Gold Cake', total: 159.99, status: 'pending', order_date: '2025-04-06', timeline: ['pending'] }
    ];
    if(!localStorage.getItem('tracking_orders')) localStorage.setItem('tracking_orders', JSON.stringify(sampleOrders));
    let orders = JSON.parse(localStorage.getItem('tracking_orders'));

    function getStatusCounts() {
        let counts = { pending:0, processing:0, shipped:0, delivered:0, cancelled:0 };
        orders.forEach(o => { if(counts[o.status] !== undefined) counts[o.status]++; });
        return counts;
    }

    function render() {
        let statusCounts = getStatusCounts();
        let html = `<ul class="nav nav-tabs" id="trackTab" role="tablist"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#track">Track Order</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#history">Customer History</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#stats">Statistics</button></li></ul>
        <div class="tab-content mt-3"><div class="tab-pane fade show active" id="track"><div class="card p-4"><h5>Track Your Order</h5><form id="trackForm"><div class="row"><div class="col"><input type="text" id="trackOrderNum" class="form-control" placeholder="Order Number" required></div><div class="col"><input type="email" id="trackEmail" class="form-control" placeholder="Email" required></div><div class="col-auto"><button type="submit" class="btn btn-warm">Track</button></div></div></form><div id="trackResult" class="mt-4"></div></div></div>
        <div class="tab-pane fade" id="history"><div class="card p-4"><h5>Customer Order History</h5><form id="historyForm"><div class="row"><div class="col"><input type="email" id="histEmail" class="form-control" placeholder="Customer Email" required></div><div class="col-auto"><button type="submit" class="btn btn-warm">View Orders</button></div></div></form><div id="historyResult" class="mt-3"></div></div></div>
        <div class="tab-pane fade" id="stats"><div class="row">${Object.entries(statusCounts).map(([k,v]) => `<div class="col-md-4 mb-3"><div class="card text-center p-3"><i class="bi bi-${k==='delivered'?'check-circle':k==='pending'?'clock':'truck'} fs-2"></i><h3>${v}</h3><p>${k.toUpperCase()}</p></div></div>`).join('')}</div></div></div>`;
        document.getElementById('trackingApp').innerHTML = html;

        document.getElementById('trackForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            let num = document.getElementById('trackOrderNum').value;
            let email = document.getElementById('trackEmail').value;
            let order = orders.find(o => o.order_number === num && o.customer_email === email);
            let resultDiv = document.getElementById('trackResult');
            if(!order) { resultDiv.innerHTML = '<div class="alert alert-danger">Order not found</div>'; return; }
            let timelineHtml = `<div class="mt-3"><h6>Status Timeline</h6><div class="d-flex justify-content-between">${['pending','processing','shipped','delivered'].map(s => `<div class="text-center"><div class="timeline-icon ${order.timeline.includes(s) ? 'completed' : ''}"><i class="bi ${s==='delivered'?'bi-check-lg':s==='shipped'?'bi-truck':'bi-clock'}"></i></div><small>${s}</small></div>`).join('')}</div></div>`;
            resultDiv.innerHTML = `<div class="alert alert-success">Order ${order.order_number} - Status: <strong>${order.status}</strong>${timelineHtml}<hr><p>Product: ${order.product_name}<br>Total: $${order.total}<br>Order Date: ${order.order_date}</p></div>`;
        });
        document.getElementById('historyForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            let email = document.getElementById('histEmail').value;
            let custOrders = orders.filter(o => o.customer_email === email);
            let resultDiv = document.getElementById('historyResult');
            if(custOrders.length === 0) resultDiv.innerHTML = '<div class="alert alert-warning">No orders found</div>';
            else resultDiv.innerHTML = `<ul class="list-group">${custOrders.map(o => `<li class="list-group-item d-flex justify-content-between"><span>${o.order_number} - ${o.product_name}</span><span class="badge bg-secondary">${o.status}</span></li>`).join('')}</ul>`;
        });
    }
    render();
    // bootstrap JS for tabs (reuse existing CDN)
    const script = document.createElement('script'); script.src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"; document.body.appendChild(script);
</script>
</body>
</html>
