<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavos Bakery | Complete Enterprise Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --lavos-primary: #c49a6c;
            --lavos-secondary: #2c1810;
            --lavos-dark: #1a1a1a;
            --lavos-light: #fdf8f5;
        }
        * { font-family: 'Segoe UI', system-ui; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .sidebar { background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); min-height: 100vh; transition: 0.3s; position: fixed; width: 280px; z-index: 1000; }
        .sidebar .nav-link { color: #b9c3e6; border-radius: 12px; margin: 6px 12px; padding: 12px 18px; transition: all 0.3s; cursor: pointer; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #d4a373; color: #1a1e2b; transform: translateX(5px); }
        .sidebar .nav-link i { margin-right: 10px; }
        .main-content { margin-left: 280px; transition: 0.3s; }
        .navbar-custom { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.05); padding: 15px 25px; border-radius: 0 0 20px 20px; }
        .stat-card { background: white; border-radius: 28px; border: none; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); padding: 20px; text-align: center; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .cake-card, .product-card { background: white; border-radius: 20px; overflow: hidden; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.08); height: 100%; }
        .cake-card:hover, .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .cake-card img, .product-card img { height: 200px; object-fit: cover; width: 100%; }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        .btn-warm { background: #d4a373; border: none; color: #2c3e50; font-weight: 600; border-radius: 40px; padding: 10px 25px; transition: all 0.3s; }
        .btn-warm:hover { background: #c4956a; transform: translateY(-2px); color: #2c3e50; }
        .role-selector { background: white; border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .role-selector:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .role-selector.admin { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .role-selector.user { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .mobile-toggle { display: none; cursor: pointer; font-size: 1.8rem; }
        @media (max-width: 768px) { .sidebar { left: -280px; } .sidebar.show { left: 0; } .main-content { margin-left: 0; } .mobile-toggle { display: block; } }
        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: #d4a373; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1000; }
        .back-to-top.show { opacity: 1; visibility: visible; }
        .badge-status-pending { background: #ffc107; color: #000; }
        .badge-status-processing { background: #17a2b8; color: #fff; }
        .badge-status-shipped { background: #6f42c1; color: #fff; }
        .badge-status-delivered { background: #28a745; color: #fff; }
        .badge-status-cancelled { background: #dc3545; color: #fff; }
        .premium-footer { background: linear-gradient(135deg, #1a252f, #0f1a24); color: #ecf0f1; margin-top: 40px; padding: 40px 0 20px; }
        .social-icon { display: inline-flex; width: 38px; height: 38px; background: rgba(255,255,255,0.1); border-radius: 50%; align-items: center; justify-content: center; margin-right: 8px; transition: 0.3s; text-decoration: none; color: white; }
        .social-icon:hover { background: #d4a373; transform: translateY(-3px); color: white; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ============================================================
    // LAVOS BAKERY - COMPLETE ENTERPRISE MANAGEMENT SYSTEM
    // URL: lavos-enterprise.html
    // NO LOGIN REQUIRED - DIRECT ACCESS
    // ============================================================

    const STORAGE_KEYS = {
        CURRENT_ROLE: 'lavos_enterprise_role',
        PRODUCTS: 'lavos_enterprise_products',
        ORDERS: 'lavos_enterprise_orders',
        TRANSACTIONS: 'lavos_enterprise_transactions',
        INQUIRIES: 'lavos_enterprise_inquiries'
    };

    let currentRole = localStorage.getItem(STORAGE_KEYS.CURRENT_ROLE) || null;
    let currentPage = 'dashboard';

    const initializeData = () => {
        if (!localStorage.getItem(STORAGE_KEYS.PRODUCTS)) {
            localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify([
                { id: 1, name: 'Royal Wedding Cake', description: '3-tier white wedding cake with gold leaf', price: 299.99, stock: 10, image_url: 'https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?w=300', category: 'wedding' },
                { id: 2, name: 'Rainbow Birthday Cake', description: 'Colorful layers with sprinkles', price: 89.99, stock: 15, image_url: 'https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg?w=300', category: 'birthday' },
                { id: 3, name: 'Gold Celebration Cake', description: '24k edible gold drip cake', price: 159.99, stock: 8, image_url: 'https://images.pexels.com/photos/746016/pexels-photo-746016.jpeg?w=300', category: 'celebration' },
                { id: 4, name: 'Chocolate Fudge Cake', description: 'Rich chocolate layers with ganache', price: 55.00, stock: 20, image_url: 'https://images.pexels.com/photos/1854651/pexels-photo-1854651.jpeg?w=300', category: 'birthday' },
                { id: 5, name: 'Rustic Wedding Cake', description: 'Naked cake with fresh berries', price: 249.99, stock: 5, image_url: 'https://images.pexels.com/photos/461428/pexels-photo-461428.jpeg?w=300', category: 'wedding' }
            ]));
        }
        if (!localStorage.getItem(STORAGE_KEYS.ORDERS)) localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_KEYS.TRANSACTIONS)) localStorage.setItem(STORAGE_KEYS.TRANSACTIONS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_KEYS.INQUIRIES)) localStorage.setItem(STORAGE_KEYS.INQUIRIES, JSON.stringify([]));
    };

    const generateId = () => Date.now() + Math.floor(Math.random() * 10000);
    const generateOrderNumber = () => 'ORD' + new Date().toISOString().slice(0,10).replace(/-/g,'') + Math.floor(Math.random()*10000);
    const generateTransactionId = () => 'TXN' + Date.now() + Math.floor(Math.random()*100000);
    const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'Never';
    const formatCurrency = (a) => '$' + parseFloat(a).toFixed(2);
    const escapeHtml = (s) => s ? s.replace(/[&<>]/g, function(m){ if(m==='&')return'&amp;'; if(m==='<')return'&lt;'; if(m==='>')return'&gt;'; return m;}) : '';
    const isAdmin = () => currentRole === 'admin';
    const showMessage = (msg, type) => { const d = document.getElementById('pageMessage'); if(d) { d.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`; setTimeout(()=>{const a=d.querySelector('.alert'); if(a)a.remove();},3000); } };

    const getProducts = () => JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS));
    const addProduct = (p) => { const products = getProducts(); products.push({ id: generateId(), ...p }); localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); return {success:true}; };
    const updateProduct = (id, data) => { const products = getProducts(); const idx = products.findIndex(p=>p.id===id); if(idx!==-1){ products[idx]={...products[idx],...data}; localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); return{success:true}; } return{success:false}; };
    const deleteProduct = (id) => { let products = getProducts(); products = products.filter(p=>p.id!==id); localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); return{success:true}; };

    const getOrders = () => JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS));
    const createOrder = (data) => {
        const products = getProducts();
        const product = products.find(p=>p.id===data.product_id);
        if(!product) return {success:false, error:'Product not found'};
        if(product.stock < data.quantity) return {success:false, error:'Insufficient stock'};
        const total = product.price * data.quantity;
        const orderNumber = generateOrderNumber();
        const order = { id: generateId(), order_number: orderNumber, customer_name: data.customer_name, customer_email: data.customer_email, customer_phone: data.customer_phone || '', product_id: product.id, product_name: product.name, quantity: data.quantity, unit_price: product.price, total: total, status: 'pending', payment_status: 'pending', payment_method: data.payment_method || 'Credit Card', order_date: new Date().toISOString() };
        product.stock -= data.quantity;
        localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products));
        const orders = getOrders();
        orders.push(order);
        localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders));
        const transactions = JSON.parse(localStorage.getItem(STORAGE_KEYS.TRANSACTIONS));
        transactions.push({ id: generateId(), transaction_id: generateTransactionId(), order_id: order.id, amount: total, payment_method: data.payment_method, status: 'completed', transaction_date: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEYS.TRANSACTIONS, JSON.stringify(transactions));
        return {success:true, order_number: orderNumber, total: total};
    };
    const updateOrderStatus = (orderId, status) => { const orders = getOrders(); const idx = orders.findIndex(o=>o.id===orderId); if(idx!==-1){ orders[idx].status=status; localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders)); return{success:true}; } return{success:false}; };
    const cancelOrder = (orderId) => { const orders = getOrders(); const idx = orders.findIndex(o=>o.id===orderId); if(idx!==-1 && orders[idx].status!=='cancelled' && orders[idx].status!=='delivered'){ const products = getProducts(); const p = products.find(p=>p.id===orders[idx].product_id); if(p) p.stock += orders[idx].quantity; localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(products)); orders[idx].status='cancelled'; localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders)); return{success:true}; } return{success:false}; };

    const getTransactions = () => JSON.parse(localStorage.getItem(STORAGE_KEYS.TRANSACTIONS));
    const updateTransactionStatus = (txId, status) => { const tx = getTransactions(); const idx = tx.findIndex(t=>t.transaction_id===txId); if(idx!==-1){ tx[idx].status=status; localStorage.setItem(STORAGE_KEYS.TRANSACTIONS, JSON.stringify(tx)); return{success:true}; } return{success:false}; };
    const getTransactionStats = () => { const tx = getTransactions(); const completed = tx.filter(t=>t.status==='completed'); const total = completed.reduce((s,t)=>s+t.amount,0); return { total_count: tx.length, total_amount: total, avg_amount: tx.length>0?total/tx.length:0, completed_count: completed.length }; };

    const getInquiries = () => JSON.parse(localStorage.getItem(STORAGE_KEYS.INQUIRIES));
    const submitInquiry = (data) => { const inquiries = getInquiries(); inquiries.push({ id: generateId(), customer_name: data.customer_name, customer_email: data.customer_email, subject: data.subject, message: data.message, status: 'unread', admin_response: null, created_at: new Date().toISOString() }); localStorage.setItem(STORAGE_KEYS.INQUIRIES, JSON.stringify(inquiries)); return{success:true}; };
    const replyToInquiry = (inquiryId, response) => { const inquiries = getInquiries(); const idx = inquiries.findIndex(i=>i.id===inquiryId); if(idx!==-1){ inquiries[idx].admin_response=response; inquiries[idx].status='replied'; localStorage.setItem(STORAGE_KEYS.INQUIRIES, JSON.stringify(inquiries)); return{success:true}; } return{success:false}; };

    const getStats = () => ({ total_products: getProducts().length, total_orders: getOrders().length, total_revenue: getTransactionStats().total_amount, total_inquiries: getInquiries().length, pending_orders: getOrders().filter(o=>o.status==='pending').length, completed_orders: getOrders().filter(o=>o.status==='delivered').length });

    const renderRoleSelection = () => `<div class="container" style="min-height:100vh; display:flex; align-items:center; justify-content:center;"><div class="row g-4 w-100"><div class="col-md-6"><div class="role-selector admin p-5 text-center" onclick="selectRole('admin')"><i class="bi bi-shield-lock fs-1 mb-3"></i><h2>Admin Dashboard</h2><p>Full access to manage products, orders, and inquiries</p><hr class="my-3 bg-white"><small><i class="bi bi-check-circle"></i> Add/Edit/Delete Products</small><br><small><i class="bi bi-check-circle"></i> Update Order Status</small><br><small><i class="bi bi-check-circle"></i> Reply to Inquiries</small></div></div><div class="col-md-6"><div class="role-selector user p-5 text-center" onclick="selectRole('user')"><i class="bi bi-person-circle fs-1 mb-3"></i><h2>User Dashboard</h2><p>Browse cakes, place orders, and submit inquiries</p><hr class="my-3 bg-white"><small><i class="bi bi-check-circle"></i> View Cake Gallery</small><br><small><i class="bi bi-check-circle"></i> Place Orders</small><br><small><i class="bi bi-check-circle"></i> Submit Inquiries</small></div></div></div></div>`;

    const renderDashboard = () => { const s = getStats(); const a = isAdmin(); return `<div class="row g-4 mb-5"><div class="col-md-3 col-6"><div class="stat-card" onclick="renderProductsPage()"><i class="bi bi-boxes fs-2 text-primary"></i><h2>${s.total_products}</h2><span>Products</span></div></div><div class="col-md-3 col-6"><div class="stat-card" onclick="renderOrdersPage()"><i class="bi bi-cart fs-2 text-success"></i><h2>${s.total_orders}</h2><span>Orders</span></div></div>${a?`<div class="col-md-3 col-6"><div class="stat-card" onclick="renderTransactionsPage()"><i class="bi bi-credit-card fs-2 text-warning"></i><h2>${formatCurrency(s.total_revenue)}</h2><span>Revenue</span></div></div><div class="col-md-3 col-6"><div class="stat-card" onclick="renderInquiriesPage()"><i class="bi bi-envelope fs-2 text-danger"></i><h2>${s.total_inquiries}</h2><span>Inquiries</span></div></div>`:`<div class="col-md-3 col-6"><div class="stat-card" onclick="renderTransactionsPage()"><i class="bi bi-credit-card fs-2 text-info"></i><h2>${s.total_orders}</h2><span>My Orders</span></div></div>`}</div><div class="row g-4 mb-5"><div class="col-md-4"><div class="stat-card"><i class="bi bi-hourglass-split fs-2 text-warning"></i><h2>${s.pending_orders}</h2><span>Pending Orders</span></div></div><div class="col-md-4"><div class="stat-card"><i class="bi bi-check-circle fs-2 text-success"></i><h2>${s.completed_orders}</h2><span>Completed Orders</span></div></div><div class="col-md-4"><div class="stat-card"><i class="bi bi-x-circle fs-2 text-danger"></i><h2>${s.total_orders - s.completed_orders - s.pending_orders}</h2><span>Cancelled</span></div></div></div><div class="card shadow-sm"><div class="card-body"><h5><i class="bi bi-cake2"></i> Welcome to Lavos Bakery</h5><p>Manage products, track orders, view transactions, and respond to inquiries.</p><div class="alert alert-info"><i class="bi bi-info-circle"></i> You are in <strong>${a?'Admin':'User'} Mode</strong>. <a href="#" onclick="switchRole(); return false;" class="alert-link">Click here to switch role</a>.</div></div></div>`; };

    const renderCakeGallery = () => { const p=getProducts(); const w=p.filter(p=>p.category==='wedding'), b=p.filter(p=>p.category==='birthday'), c=p.filter(p=>p.category==='celebration'); const rc=(cakes,title,icon,color)=>cakes.length?`<h4 class="mt-4"><i class="bi ${icon} ${color}"></i> ${title}</h4><div class="row g-4 mb-5">${cakes.map(c=>`<div class="col-md-4 col-lg-3"><div class="cake-card"><img src="${c.image_url}"><div class="p-3"><h6>${escapeHtml(c.name)}</h6><p class="small text-muted">${c.description.substring(0,60)}...</p><div class="d-flex justify-content-between align-items-center"><span class="fw-bold text-success">${formatCurrency(c.price)}</span><button class="btn btn-sm btn-warm" onclick="showOrderModal(${c.id},'${escapeHtml(c.name)}',${c.price})">Order Now</button></div></div></div></div>`).join('')}</div>`:''; return `<h3><i class="bi bi-cake2 text-warning"></i> Premium Cake Collection</h3>${rc(w,'Wedding Cakes','bi-gem','text-primary')}${rc(b,'Birthday Cakes','bi-gift','text-info')}${rc(c,'Celebration Cakes','bi-star-fill','text-warning')}`; };

    const renderProducts = () => { const a=isAdmin(); const p=getProducts(); return `<div class="d-flex justify-content-between mb-3"><h3><i class="bi bi-box-seam"></i> Product Catalog</h3>${a?'<button class="btn btn-primary" onclick="showAddProductModal()">+ Add Product</button>':''}</div><div class="row g-4">${p.map(p=>`<div class="col-md-4 col-lg-3"><div class="product-card"><img src="${p.image_url}" style="height:150px;object-fit:cover;"><div class="p-3"><h6>${escapeHtml(p.name)}</h6><p class="small text-muted">${p.description.substring(0,50)}...</p><h6 class="text-primary">${formatCurrency(p.price)}</h6><span class="badge bg-secondary">Stock: ${p.stock}</span>${a?`<div class="mt-2"><button class="btn btn-sm btn-outline-secondary" onclick="showEditProductModal(${p.id})">Edit</button><button class="btn btn-sm btn-outline-danger" onclick="deleteProductHandler(${p.id})">Delete</button></div>`:`<div class="mt-2"><button class="btn btn-sm btn-warm w-100" onclick="showOrderModal(${p.id},'${escapeHtml(p.name)}',${p.price})">Order Now</button></div>`}</div></div></div>`).join('')}</div>${a?renderAddProductModal()+renderEditProductModal():''}`; };

    const renderOrders = () => { const a=isAdmin(); const o=getOrders(); return `<h3><i class="bi bi-cart3"></i> ${a?'All Orders':'Orders'}</h3><div class="table-container"><table class="table table-hover"><thead><tr><th>Order #</th><th>Customer</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Payment</th><th>Date</th>${a?'<th>Action</th>':'<th>Cancel</th>'}</tr></thead><tbody>${o.map(o=>`<tr><td>${escapeHtml(o.order_number)}</td><td>${escapeHtml(o.customer_name)}</td><td>${escapeHtml(o.product_name)}</td><td>${o.quantity}</td><td>${formatCurrency(o.total)}</td><td><span class="badge badge-status-${o.status}">${o.status}</span></td><td><span class="badge ${o.payment_status==='paid'?'bg-success':'bg-secondary'}">${o.payment_status}</span></td><td>${formatDate(o.order_date)}</td><td>${a?`<select id="status_${o.id}" class="form-select form-select-sm d-inline w-auto"><option value="pending" ${o.status==='pending'?'selected':''}>Pending</option><option value="processing" ${o.status==='processing'?'selected':''}>Processing</option><option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option><option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option><option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option></select><button class="btn btn-sm btn-primary mt-1" onclick="updateOrderStatusHandler(${o.id})">Update</button>`:(o.status!=='cancelled'&&o.status!=='delivered'?`<button class="btn btn-sm btn-danger" onclick="cancelOrderHandler(${o.id})">Cancel</button>`:'—')}</td></tr>`).join('')}${o.length===0?'<tr><td colspan="9" class="text-center">No orders found</td></tr>':''}</tbody></table></div>`; };

    const renderTransactions = () => { const a=isAdmin(); const tx=getTransactions(); const s=getTransactionStats(); return `<h3><i class="bi bi-credit-card"></i> ${a?'All Transactions':'Transactions'}</h3>${a?`<div class="row g-3 mb-4"><div class="col-md-3 col-6"><div class="stat-card p-2 text-center"><small>Revenue</small><h5 class="text-success">${formatCurrency(s.total_amount)}</h5></div></div><div class="col-md-3 col-6"><div class="stat-card p-2 text-center"><small>Transactions</small><h5>${s.total_count}</h5></div></div><div class="col-md-3 col-6"><div class="stat-card p-2 text-center"><small>Completed</small><h5>${s.completed_count}</h5></div></div><div class="col-md-3 col-6"><div class="stat-card p-2 text-center"><small>Avg</small><h5>${formatCurrency(s.avg_amount)}</h5></div></div></div>`:''}<div class="table-container"><table class="table table-hover"><thead><tr><th>Transaction ID</th><th>Order ID</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th>${a?'<th>Action</th>':''}</tr></thead><tbody>${tx.map(t=>`<tr><td>${escapeHtml(t.transaction_id)}</td><td>${t.order_id||'N/A'}</td><td>${formatCurrency(t.amount)}</td><td>${escapeHtml(t.payment_method)}</td><td><span class="badge ${t.status==='completed'?'bg-success':(t.status==='failed'?'bg-danger':'bg-warning')}">${t.status}</span></td><td>${formatDate(t.transaction_date)}</td>${a?`<td><select id="tx_status_${t.transaction_id}" class="form-select form-select-sm d-inline w-auto"><option ${t.status==='pending'?'selected':''}>pending</option><option ${t.status==='completed'?'selected':''}>completed</option><option ${t.status==='failed'?'selected':''}>failed</option><option ${t.status==='refunded'?'selected':''}>refunded</option></select><button class="btn btn-sm btn-primary mt-1" onclick="updateTransactionStatusHandler('${t.transaction_id}')">Update</button></td>`:''}</tr>`).join('')}${tx.length===0?'<tr><td colspan="6" class="text-center">No transactions found</td></tr>':''}</tbody></table></div>`; };

    const renderInquiries = () => { const a=isAdmin(); const i=getInquiries(); return `<div class="row"><div class="col-lg-7"><h3><i class="bi bi-chat-dots"></i> ${a?'All Inquiries':'My Inquiries'}</h3>${i.map(i=>`<div class="card mb-2"><div class="card-body"><b>${escapeHtml(i.customer_name)}</b> (${escapeHtml(i.customer_email)}) <span class="badge ${i.status==='unread'?'bg-danger':(i.status==='replied'?'bg-success':'bg-secondary')}">${i.status}</span><p class="mt-2"><strong>Subject:</strong> ${escapeHtml(i.subject)}</p><p>${escapeHtml(i.message)}</p>${a&&i.status!=='replied'?`<form onsubmit="replyToInquiryHandler(${i.id}, this); return false;"><textarea name="response" class="form-control mb-1" rows="2" placeholder="Admin response..." required></textarea><button type="submit" class="btn btn-sm btn-primary">Reply</button></form>`:''}${i.admin_response?`<div class="alert alert-light mt-2"><strong>Response:</strong> ${escapeHtml(i.admin_response)}</div>`:''}</div></div>`).join('')}${i.length===0?'<div class="alert alert-info">No inquiries found</div>':''}</div><div class="col-lg-5"><div class="card"><div class="card-header bg-warm text-white"><i class="bi bi-plus-circle"></i> New Inquiry</div><div class="card-body"><form id="inquiryForm" onsubmit="submitInquiryHandler(this); return false;"><input type="text" name="customer_name" class="form-control mb-2" placeholder="Your Name" required><input type="email" name="email" class="form-control mb-2" placeholder="Email" required><input type="text" name="subject" class="form-control mb-2" placeholder="Subject" required><textarea name="message" rows="4" class="form-control mb-2" placeholder="Your message..." required></textarea><button type="submit" class="btn btn-warm w-100">Submit Inquiry</button></form></div></div></div></div>`; };

    const renderAddProductModal = () => `<div class="modal fade" id="addProductModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5>Add Product</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="addProductForm"><input type="text" name="name" class="form-control mb-2" placeholder="Name" required><textarea name="description" class="form-control mb-2" placeholder="Description"></textarea><input type="number" step="0.01" name="price" class="form-control mb-2" placeholder="Price" required><input type="number" name="stock" class="form-control mb-2" placeholder="Stock" required><input type="url" name="image_url" class="form-control mb-2" placeholder="Image URL"><select name="category" class="form-control"><option value="wedding">Wedding</option><option value="birthday">Birthday</option><option value="celebration">Celebration</option></select></form></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="addProductHandler()">Add</button></div></div></div></div>`;
    const renderEditProductModal = () => `<div class="modal fade" id="editProductModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-warning text-white"><h5>Edit Product</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="editProductForm"><input type="hidden" id="editProductId"><input type="text" id="editProductName" class="form-control mb-2" placeholder="Name" required><textarea id="editProductDesc" class="form-control mb-2" placeholder="Description"></textarea><input type="number" step="0.01" id="editProductPrice" class="form-control mb-2" placeholder="Price" required><input type="number" id="editProductStock" class="form-control mb-2" placeholder="Stock" required><input type="url" id="editProductImage" class="form-control mb-2" placeholder="Image URL"><select id="editProductCategory" class="form-control"><option value="wedding">Wedding</option><option value="birthday">Birthday</option><option value="celebration">Celebration</option></select></form></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-warning" onclick="updateProductHandler()">Update</button></div></div></div></div>`;
    const renderOrderModal = () => `<div class="modal fade" id="orderModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header bg-warm text-white"><h5>Place Order</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="orderProductId"><div class="mb-2"><label>Product</label><input type="text" id="orderProductName" class="form-control" readonly></div><div class="mb-2"><label>Price</label><input type="text" id="orderProductPrice" class="form-control" readonly></div><div class="mb-2"><label>Quantity</label><input type="number" id="orderQuantity" class="form-control" value="1" min="1" required></div><div class="mb-2"><label>Your Name</label><input type="text" id="orderCustomerName" class="form-control" required></div><div class="mb-2"><label>Email</label><input type="email" id="orderCustomerEmail" class="form-control" required></div><div class="mb-2"><label>Phone</label><input type="text" id="orderCustomerPhone" class="form-control" placeholder="Optional"></div><div class="mb-2"><label>Payment Method</label><select id="orderPaymentMethod" class="form-select"><option>Credit Card</option><option>PayPal</option><option>Bank Transfer</option><option>Cash on Delivery</option></select></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-warm" onclick="createOrderHandler()">Place Order</button></div></div></div></div>`;

    const renderLayout = (content) => { const a=isAdmin(); return `<div class="d-flex"><div class="sidebar" id="sidebarMenu"><div class="p-3 pt-4"><h4 class="text-white mb-4"><i class="bi bi-cake2 me-2"></i>${a?'AdminHub':'UserPanel'}</h4><ul class="nav flex-column"><li><a class="nav-link ${currentPage==='dashboard'?'active':''}" href="#" onclick="renderDashboardPage(); return false;"><i class="bi bi-speedometer2"></i> Dashboard</a></li><li><a class="nav-link ${currentPage==='products'?'active':''}" href="#" onclick="renderProductsPage(); return false;"><i class="bi bi-box-seam"></i> Products</a></li><li><a class="nav-link ${currentPage==='cakes'?'active':''}" href="#" onclick="renderCakesPage(); return false;"><i class="bi bi-cake2"></i> Cake Gallery</a></li><li><a class="nav-link ${currentPage==='orders'?'active':''}" href="#" onclick="renderOrdersPage(); return false;"><i class="bi bi-cart3"></i> Orders</a></li><li><a class="nav-link ${currentPage==='transactions'?'active':''}" href="#" onclick="renderTransactionsPage(); return false;"><i class="bi bi-credit-card"></i> Transactions</a></li><li><a class="nav-link ${currentPage==='inquiries'?'active':''}" href="#" onclick="renderInquiriesPage(); return false;"><i class="bi bi-chat-dots"></i> Inquiries</a></li></ul><hr class="text-white-50"><button onclick="switchRole()" class="btn btn-outline-light w-100 mt-2"><i class="bi bi-arrow-repeat"></i> Switch to ${a?'User':'Admin'}</button></div></div><div class="main-content flex-grow-1"><nav class="navbar-custom d-flex justify-content-between align-items-center"><div class="mobile-toggle" id="mobileToggle"><i class="bi bi-list"></i></div><div class="fw-bold">🍰 Lavos Bakery - ${a?'Administrator':'Customer'}</div><div><i class="bi bi-person-circle fs-5"></i></div></nav><div class="container-fluid px-4 py-4"><div id="pageMessage"></div>${content}</div></div></div>${renderOrderModal()}${renderAddProductModal()}${renderEditProductModal()}`; };

    window.selectRole = (role) => { currentRole = role; localStorage.setItem(STORAGE_KEYS.CURRENT_ROLE, role); renderDashboardPage(); };
    window.switchRole = () => { currentRole = isAdmin() ? 'user' : 'admin'; localStorage.setItem(STORAGE_KEYS.CURRENT_ROLE, currentRole); renderDashboardPage(); showMessage(`Switched to ${isAdmin()?'Admin':'User'} mode`,'info'); };
    window.renderDashboardPage = () => { currentPage='dashboard'; document.getElementById('app').innerHTML = renderLayout(renderDashboard()); attachMobileToggle(); };
    window.renderProductsPage = () => { currentPage='products'; document.getElementById('app').innerHTML = renderLayout(renderProducts()); attachMobileToggle(); };
    window.renderCakesPage = () => { currentPage='cakes'; document.getElementById('app').innerHTML = renderLayout(renderCakeGallery()); attachMobileToggle(); };
    window.renderOrdersPage = () => { currentPage='orders'; document.getElementById('app').innerHTML = renderLayout(renderOrders()); attachMobileToggle(); };
    window.renderTransactionsPage = () => { currentPage='transactions'; document.getElementById('app').innerHTML = renderLayout(renderTransactions()); attachMobileToggle(); };
    window.renderInquiriesPage = () => { currentPage='inquiries'; document.getElementById('app').innerHTML = renderLayout(renderInquiries()); attachMobileToggle(); };
    window.showOrderModal = (id,name,price) => { document.getElementById('orderProductId').value=id; document.getElementById('orderProductName').value=name; document.getElementById('orderProductPrice').value=formatCurrency(price); document.getElementById('orderCustomerName').value='Guest User'; document.getElementById('orderCustomerEmail').value='guest@lavosbakery.com'; new bootstrap.Modal(document.getElementById('orderModal')).show(); };
    window.createOrderHandler = () => { const r=createOrder({ product_id: parseInt(document.getElementById('orderProductId').value), customer_name: document.getElementById('orderCustomerName').value, customer_email: document.getElementById('orderCustomerEmail').value, customer_phone: document.getElementById('orderCustomerPhone').value, quantity: parseInt(document.getElementById('orderQuantity').value), payment_method: document.getElementById('orderPaymentMethod').value }); if(r.success){ bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide(); renderOrdersPage(); showMessage(`Order #${r.order_number} created! Total: ${formatCurrency(r.total)}`,'success'); } else showMessage(r.error,'danger'); };
    window.updateOrderStatusHandler = (id) => { const s=document.getElementById(`status_${id}`).value; updateOrderStatus(id,s); renderOrdersPage(); showMessage('Order status updated','success'); };
    window.cancelOrderHandler = (id) => { if(confirm('Cancel this order?')){ cancelOrder(id); renderOrdersPage(); showMessage('Order cancelled','success'); } };
    window.updateTransactionStatusHandler = (id) => { const s=document.getElementById(`tx_status_${id}`).value; updateTransactionStatus(id,s); renderTransactionsPage(); showMessage('Transaction updated','success'); };
    window.submitInquiryHandler = (f) => { submitInquiry({ customer_name: f.querySelector('[name="customer_name"]').value, customer_email: f.querySelector('[name="email"]').value, subject: f.querySelector('[name="subject"]').value, message: f.querySelector('[name="message"]').value }); f.reset(); renderInquiriesPage(); showMessage('Inquiry submitted!','success'); };
    window.replyToInquiryHandler = (id,f) => { replyToInquiry(id, f.querySelector('[name="response"]').value); renderInquiriesPage(); showMessage('Response sent!','success'); };
    window.showAddProductModal = () => new bootstrap.Modal(document.getElementById('addProductModal')).show();
    window.addProductHandler = () => { const f=document.getElementById('addProductForm'); addProduct({ name: f.querySelector('[name="name"]').value, description: f.querySelector('[name="description"]').value, price: parseFloat(f.querySelector('[name="price"]').value), stock: parseInt(f.querySelector('[name="stock"]').value), image_url: f.querySelector('[name="image_url"]').value || 'https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?w=300', category: f.querySelector('[name="category"]').value }); bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide(); renderProductsPage(); showMessage('Product added!','success'); };
    window.showEditProductModal = (id) => { const p=getProducts().find(p=>p.id===id); if(p){ document.getElementById('editProductId').value=p.id; document.getElementById('editProductName').value=p.name; document.getElementById('editProductDesc').value=p.description; document.getElementById('editProductPrice').value=p.price; document.getElementById('editProductStock').value=p.stock; document.getElementById('editProductImage').value=p.image_url; document.getElementById('editProductCategory').value=p.category; new bootstrap.Modal(document.getElementById('editProductModal')).show(); } };
    window.updateProductHandler = () => { const id=parseInt(document.getElementById('editProductId').value); updateProduct(id,{ name: document.getElementById('editProductName').value, description: document.getElementById('editProductDesc').value, price: parseFloat(document.getElementById('editProductPrice').value), stock: parseInt(document.getElementById('editProductStock').value), image_url: document.getElementById('editProductImage').value, category: document.getElementById('editProductCategory').value }); bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide(); renderProductsPage(); showMessage('Product updated!','success'); };
    window.deleteProductHandler = (id) => { if(confirm('Delete this product?')){ deleteProduct(id); renderProductsPage(); showMessage('Product deleted','success'); } };
    const attachMobileToggle = () => { const t=document.getElementById('mobileToggle'), s=document.getElementById('sidebarMenu'); if(t&&s) t.onclick=()=>s.classList.toggle('show'); };
    initializeData(); if(currentRole) renderDashboardPage(); else document.getElementById('app').innerHTML = renderRoleSelection();
    window.onload = () => { const backBtn=document.getElementById('backToTopBtn'); if(backBtn){ window.addEventListener('scroll',()=>backBtn.classList.toggle('show',window.scrollY>300)); backBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'})); } };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
