<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Dashboard – Lavos Bakery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', system-ui; }
        .sidebar { background: linear-gradient(180deg, #1a1e2b 0%, #0f1119 100%); min-height: 100vh; position: fixed; width: 260px; }
        .sidebar .nav-link { color: #b9c3e6; border-radius: 12px; margin: 6px 12px; padding: 10px 18px; cursor: pointer; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #d4a373; color: #1a1e2b; }
        .main-content { margin-left: 260px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-4px); }
        .btn-warm { background: #d4a373; border: none; color: #2c3e50; border-radius: 40px; padding: 8px 20px; }
        .product-card, .cake-card { background: white; border-radius: 16px; overflow: hidden; height: 100%; }
        @media (max-width:768px){ .sidebar{ left:-260px; position:fixed; } .sidebar.show{ left:0; } .main-content{ margin-left:0; } }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar" id="sidebarMenu">
        <div class="p-3 pt-4"><h4 class="text-white mb-4">OrderHub</h4>
            <ul class="nav flex-column">
                <li><a class="nav-link active" href="#" onclick="renderDashboard()"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li><a class="nav-link" href="#" onclick="renderProducts()"><i class="bi bi-box-seam"></i> Products</a></li>
                <li><a class="nav-link" href="#" onclick="renderOrders()"><i class="bi bi-cart3"></i> Orders</a></li>
                <li><a class="nav-link" href="#" onclick="renderTransactions()"><i class="bi bi-credit-card"></i> Transactions</a></li>
            </ul>
            <hr class="text-white-50">
            <button onclick="switchToAdmin()" class="btn btn-outline-light w-100">Switch to Admin</button>
        </div>
    </div>
    <div class="main-content flex-grow-1" id="mainContent"></div>
</div>
<script>
    const STORAGE = { PRODUCTS: 'order_products', ORDERS: 'order_orders', TRANSACTIONS: 'order_transactions' };
    function init() {
        if(!localStorage.getItem(STORAGE.PRODUCTS)) localStorage.setItem(STORAGE.PRODUCTS, JSON.stringify([
            { id:1, name:'Royal Wedding Cake', price:299.99, stock:10, image:'https://images.pexels.com/photos/1721934/pexels-photo-1721934.jpeg?w=200' },
            { id:2, name:'Rainbow Cake', price:89.99, stock:15, image:'https://images.pexels.com/photos/291528/pexels-photo-291528.jpeg?w=200' }
        ]));
        if(!localStorage.getItem(STORAGE.ORDERS)) localStorage.setItem(STORAGE.ORDERS, JSON.stringify([]));
        if(!localStorage.getItem(STORAGE.TRANSACTIONS)) localStorage.setItem(STORAGE.TRANSACTIONS, JSON.stringify([]));
    }
    function getProducts(){ return JSON.parse(localStorage.getItem(STORAGE.PRODUCTS)); }
    function getOrders(){ return JSON.parse(localStorage.getItem(STORAGE.ORDERS)); }
    function getTransactions(){ return JSON.parse(localStorage.getItem(STORAGE.TRANSACTIONS)); }
    function saveProducts(p){ localStorage.setItem(STORAGE.PRODUCTS, JSON.stringify(p)); }
    function saveOrders(o){ localStorage.setItem(STORAGE.ORDERS, JSON.stringify(o)); }
    function saveTransactions(t){ localStorage.setItem(STORAGE.TRANSACTIONS, JSON.stringify(t)); }
    function showToast(msg){ const d=document.createElement('div'); d.className='alert alert-success position-fixed bottom-0 start-50 translate-middle-x m-2'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2000); }
    function formatPrice(p){ return '$'+p.toFixed(2); }
    function renderDashboard(){ const prods=getProducts(); const orders=getOrders(); const totalRevenue=orders.reduce((s,o)=>s+o.total,0); document.getElementById('mainContent').innerHTML=`<div class="container py-4"><div class="row g-4"><div class="col-md-4"><div class="stat-card"><i class="bi bi-boxes fs-2 text-primary"></i><h2>${prods.length}</h2><span>Products</span></div></div><div class="col-md-4"><div class="stat-card"><i class="bi bi-cart fs-2 text-success"></i><h2>${orders.length}</h2><span>Orders</span></div></div><div class="col-md-4"><div class="stat-card"><i class="bi bi-currency-dollar fs-2 text-warning"></i><h2>${formatPrice(totalRevenue)}</h2><span>Revenue</span></div></div></div></div>`; }
    function renderProducts(){ const prods=getProducts(); let html=`<div class="container py-4"><h3>Products</h3><div class="row g-4">`; prods.forEach(p=>{ html+=`<div class="col-md-4"><div class="product-card"><img src="${p.image}" class="w-100" style="height:150px;object-fit:cover"><div class="p-3"><h6>${p.name}</h6><div>${formatPrice(p.price)}</div><div>Stock: ${p.stock}</div><button class="btn btn-sm btn-warm mt-2" onclick="showOrderModal(${p.id},'${p.name}',${p.price})">Order Now</button></div></div></div>`; }); html+=`</div></div>`; document.getElementById('mainContent').innerHTML=html; }
    function showOrderModal(id,name,price){ document.getElementById('orderProdId').value=id; document.getElementById('orderProdName').value=name; document.getElementById('orderProdPrice').value=formatPrice(price); document.getElementById('orderCustomerName').value=''; document.getElementById('orderCustomerEmail').value=''; new bootstrap.Modal(document.getElementById('orderModal')).show(); }
    function placeOrder(){ const pid=parseInt(document.getElementById('orderProdId').value); const qty=parseInt(document.getElementById('orderQty').value); const name=document.getElementById('orderCustomerName').value; const email=document.getElementById('orderCustomerEmail').value; if(!name||!email){ showToast('Enter name & email'); return; } let prods=getProducts(); const prod=prods.find(p=>p.id===pid); if(!prod){ showToast('Product not found'); return; } if(prod.stock<qty){ showToast('Insufficient stock'); return; } const total=prod.price*qty; const orderId=Date.now(); const order={ id:orderId, order_number:'ORD'+orderId, customer_name:name, customer_email:email, product_name:prod.name, quantity:qty, total:total, status:'pending', payment_status:'pending', order_date:new Date().toISOString() }; prod.stock-=qty; saveProducts(prods); const orders=getOrders(); orders.push(order); saveOrders(orders); const tx={ id:Date.now(), transaction_id:'TXN'+orderId, order_id:orderId, amount:total, payment_method:'Credit Card', status:'completed', transaction_date:new Date().toISOString() }; const txs=getTransactions(); txs.push(tx); saveTransactions(txs); bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide(); showToast(`Order #${order.order_number} placed! Total ${formatPrice(total)}`); renderOrders(); }
    function renderOrders(){ const orders=getOrders(); let html=`<div class="container py-4"><h3>Orders</h3><div class="table-responsive"><table class="table table-bg-white"><thead><tr><th>Order #</th><th>Customer</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Payment</th><th>Action</th></tr></thead><tbody>`; orders.forEach(o=>{ html+=`<tr><td>${o.order_number}</td><td>${o.customer_name}</td><td>${o.product_name}</td><td>${o.quantity}</td><td>${formatPrice(o.total)}</td><td><span class="badge bg-warning">${o.status}</span></td><td><span class="badge bg-secondary">${o.payment_status}</span></td><td><button class="btn btn-sm btn-danger" onclick="cancelOrder(${o.id})">Cancel</button></td></tr>`; }); html+=`</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML=html; }
    function cancelOrder(id){ let orders=getOrders(); const idx=orders.findIndex(o=>o.id===id); if(idx!==-1 && orders[idx].status==='pending'){ const prods=getProducts(); const prod=prods.find(p=>p.name===orders[idx].product_name); if(prod) prod.stock+=orders[idx].quantity; saveProducts(prods); orders[idx].status='cancelled'; saveOrders(orders); showToast('Order cancelled'); renderOrders(); } else showToast('Cannot cancel'); }
    function renderTransactions(){ const txs=getTransactions(); let html=`<div class="container py-4"><h3>Transactions</h3><div class="table-responsive"><table class="table bg-white"><thead><tr><th>Transaction ID</th><th>Order ID</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th></tr></thead><tbody>`; txs.forEach(t=>{ html+=`<tr><td>${t.transaction_id}</td><td>${t.order_id}</td><td>${formatPrice(t.amount)}</td><td>${t.payment_method}</td><td><span class="badge bg-success">${t.status}</span></td><td>${new Date(t.transaction_date).toLocaleDateString()}</td></tr>`; }); html+=`</tbody></table></div></div>`; document.getElementById('mainContent').innerHTML=html; }
    function switchToAdmin(){ localStorage.setItem('order_role','admin'); location.reload(); }
    let modalHtml=`<div class="modal fade" id="orderModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Place Order</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="orderProdId"><div class="mb-2"><label>Product</label><input type="text" id="orderProdName" class="form-control" readonly></div><div class="mb-2"><label>Price</label><input type="text" id="orderProdPrice" class="form-control" readonly></div><div class="mb-2"><label>Quantity</label><input type="number" id="orderQty" class="form-control" value="1" min="1"></div><div class="mb-2"><label>Your Name</label><input type="text" id="orderCustomerName" class="form-control" required></div><div class="mb-2"><label>Email</label><input type="email" id="orderCustomerEmail" class="form-control" required></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-warm" onclick="placeOrder()">Place Order</button></div></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',modalHtml);
    init(); renderDashboard();
    new bootstrap.Modal(document.getElementById('orderModal'));
    document.getElementById('mobileToggle')?.addEventListener('click',()=>document.getElementById('sidebarMenu').classList.toggle('show'));
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
