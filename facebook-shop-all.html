<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Shop | Complete Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --fb-primary: #1877f2; --fb-secondary: #e4e6eb; --fb-dark: #1b1f23; --fb-gray: #65676b; --fb-success: #42b72a; --fb-danger: #e41e3f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding-top: 60px; }
        .fb-header { background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 8px 0; }
        .fb-logo { color: var(--fb-primary); font-size: 32px; font-weight: 700; text-decoration: none; }
        .search-bar { background: var(--fb-secondary); border-radius: 50px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; max-width: 300px; }
        .search-bar input { background: transparent; border: none; outline: none; width: 100%; }
        .nav-icon { font-size: 24px; color: var(--fb-gray); cursor: pointer; position: relative; padding: 8px; border-radius: 50%; transition: background 0.2s; }
        .nav-icon:hover { background: var(--fb-secondary); }
        .badge-count { position: absolute; top: 0; right: 0; background: var(--fb-danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
        .fb-sidebar { background: white; border-radius: 12px; padding: 16px; position: sticky; top: 80px; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: var(--fb-dark); text-decoration: none; }
        .sidebar-item:hover { background: var(--fb-secondary); }
        .sidebar-item i { font-size: 20px; width: 24px; color: var(--fb-primary); }
        .sidebar-item.active { background: var(--fb-secondary); font-weight: 500; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; transition: all 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); height: 100%; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .product-image { position: relative; overflow: hidden; aspect-ratio: 1; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        .product-actions { position: absolute; top: 10px; right: 10px; opacity: 0; transition: opacity 0.3s; display: flex; gap: 8px; }
        .product-card:hover .product-actions { opacity: 1; }
        .action-btn { background: white; border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { background: var(--fb-primary); color: white; }
        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--fb-danger); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .product-info { padding: 12px; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 16px; font-weight: 700; color: var(--fb-primary); }
        .btn-add-cart { width: 100%; background: var(--fb-primary); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn-add-cart:hover { background: #0c63d4; }
        .filter-bar { background: white; padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .filter-chip { background: var(--fb-secondary); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .filter-chip.active { background: var(--fb-primary); color: white; }
        .sort-select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; margin-left: auto; }
        .cart-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .toast-notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 2000; animation: fadeInOut 2.5s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
        @media (max-width: 768px) { .sidebar-col { display: none; } .filter-bar { flex-wrap: wrap; } .sort-select { margin-left: 0; width: 100%; } }
    </style>
</head>
<body>

<header class="fb-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <a href="#" class="fb-logo" onclick="renderHomePage(); return false;">facebook<span style="color: var(--fb-dark);">shop</span></a>
            <div class="search-bar"><i class="bi bi-search"></i><input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()"></div>
            <div class="d-flex gap-2">
                <div class="nav-icon" onclick="toggleCart()"><i class="bi bi-cart3"></i><span class="badge-count" id="cartCount">0</span></div>
                <div class="nav-icon" onclick="toggleWishlist()"><i class="bi bi-heart"></i><span class="badge-count" id="wishlistCount">0</span></div>
            </div>
        </div>
    </div>
</header>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-3 sidebar-col"><div class="fb-sidebar" id="sidebar">
            <div class="sidebar-item active" data-page="home" onclick="renderHomePage()"><i class="bi bi-house-door"></i><span>Home</span></div>
            <div class="sidebar-item" data-page="shop" onclick="renderShopPage()"><i class="bi bi-grid-3x3-gap-fill"></i><span>Marketplace</span></div>
            <div class="sidebar-item" data-page="orders" onclick="renderOrdersPage()"><i class="bi bi-bag-check"></i><span>My Orders</span></div>
            <div class="sidebar-item" data-page="cart" onclick="renderCartPage()"><i class="bi bi-cart3"></i><span>Cart</span></div>
            <div class="sidebar-item" data-page="wishlist" onclick="renderWishlistPage()"><i class="bi bi-heart"></i><span>Wishlist</span></div>
            <hr><div class="sidebar-item" onclick="clearAllData()"><i class="bi bi-trash"></i><span>Reset Data</span></div>
        </div></div>
        <div class="col-lg-9" id="mainContent"></div>
    </div>
</div>

<script>
    const STORAGE_KEYS = { PRODUCTS: 'fb_all_products', ORDERS: 'fb_all_orders', CART: 'fb_all_cart', WISHLIST: 'fb_all_wishlist' };
    
    function initData() {
        if (!localStorage.getItem(STORAGE_KEYS.PRODUCTS)) {
            localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify([
                { id: 1, name: 'iPhone 15 Pro', description: 'Latest Apple smartphone with A17 Pro chip', price: 999.99, compare_price: 1099.99, category: 'Electronics', image: 'https://images.pexels.com/photos/699122/pexels-photo-699122.jpeg?w=300', stock: 50, rating: 4.8, sold: 1234 },
                { id: 2, name: 'Samsung Galaxy S24', description: 'Premium Android smartphone', price: 899.99, compare_price: 999.99, category: 'Electronics', image: 'https://images.pexels.com/photos/404280/pexels-photo-404280.jpeg?w=300', stock: 45, rating: 4.7, sold: 987 },
                { id: 3, name: 'Denim Jacket', description: 'Classic blue denim jacket', price: 79.99, compare_price: 99.99, category: 'Fashion', image: 'https://images.pexels.com/photos/1229042/pexels-photo-1229042.jpeg?w=300', stock: 100, rating: 4.5, sold: 2345 },
                { id: 4, name: 'Running Shoes', description: 'Comfortable athletic shoes', price: 89.99, compare_price: 119.99, category: 'Sports', image: 'https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg?w=300', stock: 75, rating: 4.6, sold: 1876 },
                { id: 5, name: 'Floor Lamp', description: 'Modern LED floor lamp', price: 49.99, compare_price: 69.99, category: 'Home', image: 'https://images.pexels.com/photos/1126359/pexels-photo-1126359.jpeg?w=300', stock: 30, rating: 4.3, sold: 543 },
                { id: 6, name: 'Throw Pillows Set', description: 'Set of 4 decorative pillows', price: 39.99, compare_price: 59.99, category: 'Home', image: 'https://images.pexels.com/photos/1854652/pexels-photo-1854652.jpeg?w=300', stock: 60, rating: 4.4, sold: 876 }
            ]));
        }
        if (!localStorage.getItem(STORAGE_KEYS.ORDERS)) localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_KEYS.CART)) localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify([]));
        if (!localStorage.getItem(STORAGE_KEYS.WISHLIST)) localStorage.setItem(STORAGE_KEYS.WISHLIST, JSON.stringify([]));
    }
    
    function showToast(msg) { const t=document.createElement('div'); t.className='toast-notification'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatCurrency(a) { return '$' + parseFloat(a).toFixed(2); }
    function renderStars(r) { let s=''; for(let i=1;i<=5;i++) s+=`<i class="bi bi-star${i<=Math.floor(r)?'-fill':''}" style="color:#ffc107;"></i>`; return s; }
    
    function getProducts() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS)); }
    function getCart() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.CART)); }
    function getWishlist() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.WISHLIST)); }
    function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS)); }
    
    function updateCartCount() { document.getElementById('cartCount').textContent = getCart().reduce((s,i)=>s+i.quantity,0); }
    function updateWishlistCount() { document.getElementById('wishlistCount').textContent = getWishlist().length; }
    
    function addToCart(productId, quantity=1) {
        let cart = getCart(); let existing = cart.find(i => i.product_id === productId);
        if(existing) existing.quantity += quantity;
        else cart.push({ id: Date.now(), product_id: productId, quantity });
        localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart));
        updateCartCount(); showToast('Added to cart!');
    }
    
    function addToWishlist(productId) {
        let wishlist = getWishlist();
        if(!wishlist.find(i => i === productId)) { wishlist.push(productId); localStorage.setItem(STORAGE_KEYS.WISHLIST, JSON.stringify(wishlist)); updateWishlistCount(); showToast('Added to wishlist!'); }
        else showToast('Already in wishlist!');
    }
    
    function removeFromWishlist(productId) {
        let wishlist = getWishlist().filter(i => i !== productId);
        localStorage.setItem(STORAGE_KEYS.WISHLIST, JSON.stringify(wishlist));
        updateWishlistCount(); renderWishlistPage(); showToast('Removed from wishlist');
    }
    
    function placeOrder(customerName, customerEmail, shippingAddress, paymentMethod) {
        const cart = getCart(); if(cart.length===0) { showToast('Cart is empty','error'); return false; }
        const products = getProducts(); let total = 0; let items = [];
        cart.forEach(item => { const p = products.find(p => p.id === item.product_id); if(p){ total += p.price * item.quantity; items.push({ product_name: p.name, quantity: item.quantity, unit_price: p.price, subtotal: p.price * item.quantity }); } });
        const orders = getOrders(); const orderNumber = 'ORD' + Date.now();
        orders.push({ id: Date.now(), order_number: orderNumber, customer_name: customerName, customer_email: customerEmail, shipping_address: shippingAddress, payment_method: paymentMethod, items: items, total: total, status: 'pending', order_date: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(orders));
        localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify([]));
        updateCartCount(); showToast(`Order #${orderNumber} placed! Total: ${formatCurrency(total)}`); return true;
    }
    
    function renderHomePage() {
        const products = getProducts().slice(0,6);
        document.getElementById('mainContent').innerHTML = `
            <div class="flash-sale bg-gradient text-white p-4 rounded mb-4" style="background: linear-gradient(135deg, #e41e3f, #ff6b35);"><h3><i class="bi bi-lightning-charge-fill"></i> Flash Sale!</h3><p>Up to 50% off on selected items</p><button class="btn btn-light" onclick="renderShopPage()">Shop Now →</button></div>
            <h4 class="mb-3">Featured Products</h4><div class="row g-4">${products.map(p => `<div class="col-md-4 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}"><div class="product-actions"><button class="action-btn" onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="bi bi-heart"></i></button></div></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join('')}</div>
        `;
        updateCartCount(); updateWishlistCount(); setActivePage('home');
    }
    
    function renderShopPage() {
        let products = getProducts();
        const html = `<div class="filter-bar"><span class="filter-chip active" data-cat="all" onclick="filterProducts('all')">All</span><span class="filter-chip" data-cat="Electronics" onclick="filterProducts('Electronics')">Electronics</span><span class="filter-chip" data-cat="Fashion" onclick="filterProducts('Fashion')">Fashion</span><span class="filter-chip" data-cat="Home" onclick="filterProducts('Home')">Home</span><span class="filter-chip" data-cat="Sports" onclick="filterProducts('Sports')">Sports</span><select class="sort-select" onchange="sortProducts(this.value)"><option value="newest">Newest</option><option value="price_low">Price: Low to High</option><option value="price_high">Price: High to Low</option></select></div>
        <div class="row" id="productsContainer">${products.map(p => `<div class="col-md-4 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}">${p.compare_price ? `<span class="sale-badge">-${Math.round((1-p.price/p.compare_price)*100)}%</span>` : ''}<div class="product-actions"><button class="action-btn" onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="bi bi-heart"></i></button></div></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}${p.compare_price ? `<span class="compare-price">${formatCurrency(p.compare_price)}</span>` : ''}</div><div class="rating small mb-2">${renderStars(p.rating)} (${p.sold})</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join('')}</div>`;
        document.getElementById('mainContent').innerHTML = html;
        updateCartCount(); updateWishlistCount(); setActivePage('shop');
    }
    
    function renderCartPage() {
        const cart = getCart(); const products = getProducts();
        if(cart.length===0) { document.getElementById('mainContent').innerHTML = `<div class="text-center py-5"><i class="bi bi-cart-x fs-1 text-muted"></i><h5 class="mt-3">Your cart is empty</h5><button class="btn btn-primary mt-2" onclick="renderShopPage()">Continue Shopping</button></div>`; return; }
        let total = 0; let itemsHtml = '';
        cart.forEach(item => { const p = products.find(p => p.id === item.product_id); if(p) { total += p.price * item.quantity; itemsHtml += `<div class="cart-item"><div class="row align-items-center"><div class="col-md-4"><h6>${escapeHtml(p.name)}</h6><div class="text-muted">${formatCurrency(p.price)} each</div></div><div class="col-md-3"><div class="input-group" style="width:120px"><button class="btn btn-outline-secondary btn-sm" onclick="updateCartQty(${item.id}, ${item.quantity-1})">-</button><input type="text" class="form-control form-control-sm text-center" value="${item.quantity}" readonly><button class="btn btn-outline-secondary btn-sm" onclick="updateCartQty(${item.id}, ${item.quantity+1})">+</button></div></div><div class="col-md-3"><strong>${formatCurrency(p.price * item.quantity)}</strong></div><div class="col-md-2"><button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${item.id})"><i class="bi bi-trash"></i></button></div></div></div>`; } });
        document.getElementById('mainContent').innerHTML = `<h2 class="mb-4">Shopping Cart</h2>${itemsHtml}<div class="mt-4 p-3 bg-light rounded"><div class="row"><div class="col-md-6 offset-md-6"><h5>Total: ${formatCurrency(total)}</h5><button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#checkoutModal">Proceed to Checkout</button></div></div></div>${renderCheckoutModal()}`;
        updateCartCount(); setActivePage('cart');
    }
    
    function renderWishlistPage() {
        const wishlist = getWishlist(); const products = getProducts(); const wishlistProducts = products.filter(p => wishlist.includes(p.id));
        document.getElementById('mainContent').innerHTML = `<h2 class="mb-4">My Wishlist</h2><div class="row">${wishlistProducts.map(p => `<div class="col-md-3 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}"></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button><button class="btn btn-sm btn-outline-danger w-100 mt-2" onclick="event.stopPropagation(); removeFromWishlist(${p.id})">Remove</button></div></div></div>`).join('')}${wishlistProducts.length===0?'<div class="col-12 text-center py-5"><i class="bi bi-heart fs-1 text-muted"></i><h5 class="mt-3">Your wishlist is empty</h5><button class="btn btn-primary mt-2" onclick="renderShopPage()">Browse Products</button></div>':''}</div>`;
        updateWishlistCount(); setActivePage('wishlist');
    }
    
    function renderOrdersPage() {
        const orders = getOrders();
        document.getElementById('mainContent').innerHTML = `<h2 class="mb-4">My Orders</h2>${orders.map(o => `<div class="card mb-3"><div class="card-header bg-light"><div class="row"><div class="col-md-4">Order #: ${o.order_number}</div><div class="col-md-4">Date: ${new Date(o.order_date).toLocaleDateString()}</div><div class="col-md-4">Total: ${formatCurrency(o.total)}</div></div></div><div class="card-body"><p><strong>Status:</strong> <span class="badge bg-warning">${o.status}</span></p><p><strong>Shipping to:</strong> ${escapeHtml(o.shipping_address)}</p><p><strong>Payment:</strong> ${escapeHtml(o.payment_method)}</p><hr><h6>Items:</h6>${o.items.map(i => `<div class="d-flex justify-content-between"><span>${escapeHtml(i.product_name)} x ${i.quantity}</span><span>${formatCurrency(i.subtotal)}</span></div>`).join('')}</div></div>`).join('')}${orders.length===0?'<div class="text-center py-5"><i class="bi bi-inbox fs-1 text-muted"></i><h5 class="mt-3">No orders yet</h5><button class="btn btn-primary mt-2" onclick="renderShopPage()">Start Shopping</button></div>':''}`;
        setActivePage('orders');
    }
    
    function renderCheckoutModal() {
        return `<div class="modal fade" id="checkoutModal"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>Checkout</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="checkoutForm"><div class="mb-2"><input type="text" id="checkoutName" class="form-control" placeholder="Full Name" required></div><div class="mb-2"><input type="email" id="checkoutEmail" class="form-control" placeholder="Email" required></div><div class="mb-2"><textarea id="checkoutAddress" class="form-control" rows="2" placeholder="Shipping Address" required></textarea></div><div class="mb-2"><select id="checkoutPayment" class="form-select"><option>Credit Card</option><option>PayPal</option><option>Cash on Delivery</option></select></div></form></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="checkout()">Place Order</button></div></div></div></div>`;
    }
    
    function checkout() { const name=document.getElementById('checkoutName').value, email=document.getElementById('checkoutEmail').value, address=document.getElementById('checkoutAddress').value, payment=document.getElementById('checkoutPayment').value; if(name&&email&&address){ placeOrder(name,email,address,payment); bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide(); renderOrdersPage(); } else showToast('Please fill all fields'); }
    function updateCartQty(cartId, qty) { let cart = getCart(); if(qty<=0) cart = cart.filter(i => i.id !== cartId); else { const idx = cart.findIndex(i=>i.id===cartId); if(idx!==-1) cart[idx].quantity = qty; } localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart)); renderCartPage(); }
    function removeFromCart(cartId) { let cart = getCart().filter(i => i.id !== cartId); localStorage.setItem(STORAGE_KEYS.CART, JSON.stringify(cart)); renderCartPage(); }
    function filterProducts(cat) { let products = getProducts(); if(cat!=='all') products = products.filter(p=>p.category===cat); document.querySelectorAll('.filter-chip').forEach(chip=>chip.classList.remove('active')); document.querySelector(`.filter-chip[data-cat="${cat}"]`).classList.add('active'); document.getElementById('productsContainer').innerHTML = products.map(p => `<div class="col-md-4 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}">${p.compare_price?`<span class="sale-badge">-${Math.round((1-p.price/p.compare_price)*100)}%</span>`:''}<div class="product-actions"><button class="action-btn" onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="bi bi-heart"></i></button></div></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}${p.compare_price?`<span class="compare-price">${formatCurrency(p.compare_price)}</span>`:''}</div><div class="rating small mb-2">${renderStars(p.rating)} (${p.sold})</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join(''); }
    function sortProducts(sort) { let products = [...getProducts()]; if(sort==='price_low') products.sort((a,b)=>a.price-b.price); else if(sort==='price_high') products.sort((a,b)=>b.price-a.price); document.getElementById('productsContainer').innerHTML = products.map(p => `<div class="col-md-4 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}">${p.compare_price?`<span class="sale-badge">-${Math.round((1-p.price/p.compare_price)*100)}%</span>`:''}<div class="product-actions"><button class="action-btn" onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="bi bi-heart"></i></button></div></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}${p.compare_price?`<span class="compare-price">${formatCurrency(p.compare_price)}</span>`:''}</div><div class="rating small mb-2">${renderStars(p.rating)} (${p.sold})</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join(''); }
    function viewProduct(id) { showToast(`Viewing product #${id}`); }
    function toggleCart() { renderCartPage(); document.getElementById('sidebar').scrollIntoView(); }
    function toggleWishlist() { renderWishlistPage(); }
    function searchProducts() { const q = document.getElementById('searchInput').value.toLowerCase(); const products = getProducts().filter(p => p.name.toLowerCase().includes(q)); document.getElementById('productsContainer')?.innerHTML = products.map(p => `<div class="col-md-4 col-sm-6 mb-4"><div class="product-card" onclick="viewProduct(${p.id})"><div class="product-image"><img src="${p.image}">${p.compare_price?`<span class="sale-badge">-${Math.round((1-p.price/p.compare_price)*100)}%</span>`:''}<div class="product-actions"><button class="action-btn" onclick="event.stopPropagation(); addToWishlist(${p.id})"><i class="bi bi-heart"></i></button></div></div><div class="product-info"><h6 class="product-title">${escapeHtml(p.name)}</h6><div class="product-price">${formatCurrency(p.price)}${p.compare_price?`<span class="compare-price">${formatCurrency(p.compare_price)}</span>`:''}</div><div class="rating small mb-2">${renderStars(p.rating)} (${p.sold})</div><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button></div></div></div>`).join(''); }
    function setActivePage(page) { document.querySelectorAll('.sidebar-item').forEach(item=>{ item.classList.remove('active'); if(item.dataset.page===page) item.classList.add('active'); }); }
    function clearAllData() { if(confirm('Reset all data? This will clear cart, wishlist, and orders.')) { localStorage.removeItem(STORAGE_KEYS.CART); localStorage.removeItem(STORAGE_KEYS.WISHLIST); localStorage.removeItem(STORAGE_KEYS.ORDERS); initData(); renderHomePage(); showToast('Data reset!'); } }
    
    initData(); renderHomePage();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
